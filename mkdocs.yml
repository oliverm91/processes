site_name: Processes
site_url: https://oliverm91.github.io/processes/
repo_url: https://github.com/oliverm91/processes/
repo_name: oliverm91/processes

theme:
  name: material
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  palette:
    # Dark Mode
    - media: "(prefers-color-scheme: dark)"
      primary: blue grey
      accent: cyan
      scheme: slate
      toggle:
        icon: material/brightness-4 
        name: Switch to light mode
    # Light Mode
    - media: "(prefers-color-scheme: light)"
      primary: blue grey
      accent: cyan
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - toc.integrate
    - navigation.sections
    - content.code.copy
    - navigation.top
    - navigation.tracking

nav:
  - Home: index.md
  - API Reference: reference.md
  - Examples:
      - Introduction: examples/intro.md
      - Basic Example: examples/basic.md
      - Advanced Case: examples/advanced.md


plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
  - social:
      cards_layout: default/variant
      cards_layout_options:
        background_color: "#061a25"
        color: "#ffffff"