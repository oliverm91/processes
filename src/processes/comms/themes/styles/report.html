<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{lang_report_title_prefix}}</title>
    <style>
{{__palette_css__}}
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-page);
            margin: 0;
            padding: 32px 16px;
            color: var(--text-primary);
        }
        .card {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        .header {
            background: var(--accent);
            color: #ffffff;
            padding: 20px 28px;
            font-size: 20px;
            font-weight: 600;
        }
        .body { padding: 24px 28px; }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin: 0 0 12px 0;
            font-weight: 600;
        }
        .summary-grid {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .summary-cell {
            flex: 1;
            text-align: center;
            padding: 16px 8px;
            border-radius: 8px;
            background: var(--code-bg);
            border: 1px solid var(--border);
        }
        .summary-cell .count {
            font-size: 30px;
            font-weight: 700;
            line-height: 1.1;
        }
        .summary-cell .s-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }
        .count-success { color: #22c55e; }
        .count-error { color: var(--alert-text, #ef4444); }
        .count-skipped { color: var(--text-muted); }
        details {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            cursor: pointer;
            font-weight: 500;
            user-select: none;
            list-style: none;
            background: var(--bg-card);
        }
        summary::-webkit-details-marker { display: none; }
        summary::after {
            content: "▶";
            font-size: 10px;
            color: var(--text-muted);
            transition: transform 0.15s;
            margin-left: 8px;
        }
        details[open] > summary::after { transform: rotate(90deg); }
        .task-name-text { font-size: 14px; }
        .task-detail {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-page);
        }
        .row {
            display: flex;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .row:last-child { border-bottom: none; }
        .row-label { flex: 0 0 110px; color: var(--text-muted); font-weight: 500; }
        .row-value { flex: 1; word-break: break-word; }
        code {
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            background: var(--code-bg);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 13px;
        }
        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-errored { background: var(--alert-bg); color: var(--alert-text); }
        .badge-skipped { background: var(--code-bg); color: var(--text-muted); border: 1px solid var(--border); }
        .subsection-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin: 14px 0 4px 0;
            font-weight: 600;
        }
        .traced-vars-blurb {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 4px;
            font-style: italic;
        }
        .traceback {
            background: var(--code-bg);
            border: 1px solid var(--border);
            padding: 12px 14px;
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
            color: var(--text-primary);
            border-radius: 6px;
            margin: 0;
        }
        ul.impact-list { margin: 4px 0 0 18px; padding: 0; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">{{lang_report_header}}</div>
        <div class="body">
            <p class="section-title">{{lang_report_summary_title}}</p>
            <div class="summary-grid">
                <div class="summary-cell">
                    <div class="count count-success">{{summary_successes}}</div>
                    <div class="s-label">{{lang_report_success_label}}</div>
                </div>
                <div class="summary-cell">
                    <div class="count count-error">{{summary_errors}}</div>
                    <div class="s-label">{{lang_report_error_label}}</div>
                </div>
                <div class="summary-cell">
                    <div class="count count-skipped">{{summary_skipped}}</div>
                    <div class="s-label">{{lang_report_skipped_label}}</div>
                </div>
            </div>
            {{task_sections}}
        </div>
    </div>
</body>
</html>
